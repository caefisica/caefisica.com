[build]
  publish = "public"
  functions = "functions"
  command = "git config core.quotepath false && bun install && bun run build"

[build.environment]
  HUGO_VERSION = "0.161.1"
  NODE_VERSION = "24"
  BUN_VERSION = "1.3.14"

[context.deploy-preview]
  command = "git config core.quotepath false && bun install && bun run build -- -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
  command = "git config core.quotepath false && bun install && bun run build -- -b $DEPLOY_PRIME_URL"

[context.next]
  command = "git config core.quotepath false && bun install && bun run build"

[context.next.environment]
  HUGO_ENV = "next"

[functions]
  directory = "functions"
  node_bundler = "esbuild"

[dev]
  framework = "#custom"
  command = "bun run hugo:start"
  targetPort = 1313
  port = 8888
  publish = "public"
  autoLaunch = false

[[redirects]]
  from = "https://caefis.netlify.app/*"
  to = "https://caefisica.com/:splat"
  status = 301
  force = true

[[plugins]]
package = "@algolia/netlify-plugin-crawler"

  [plugins.inputs]
  branches = ['master']
  disabled = false
  customDomain = "caefisica.com"
  renderJavaScript = true

[[plugins]]
  package = "netlify-plugin-cloudinary"

  [plugins.inputs]
  cloudName = "dubu"
  loadingStrategy = "lazy"
