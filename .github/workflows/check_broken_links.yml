name: url health

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "content/**"
  push:
    branches: [master]
    paths:
      - "content/**"
  schedule:
    - cron: "0 0 * * 1"

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: atalent-labs/404-links@3.1.6
        env:
          GITHUB_TOKEN: ${{ secrets.LINK_CHECK_404 }}
