{{ define "main" }}
    <div class="row justify-content-center">
        <div class="col-md-12 col-lg-10 col-xl-8">
            <h1>{{ .Title }}</h1>
            <ul>
                {{ range .Pages }}
                    <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
                {{ end }}
            </ul>
        </div>
    </div>
{{ end }}
