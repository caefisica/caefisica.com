{{ define "head/stylesheet" }}
    {{ partial "head/stylesheet.html" . }}
    {{ $sass := resources.Get "scss/components/_iframe.scss" }}
    {{ $style := $sass | toCSS (dict "transpiler" "dartsass") | fingerprint }}
    <link
        rel="stylesheet"
        href="{{ $style.RelPermalink }}"
        integrity="{{ $style.Data.Integrity }}" />
{{ end }}

{{ define "main" }}
    <div class="iframe-wrapper m-0">
        <iframe
            class="worker"
            width="100%"
            height="100%"
            src="https://d.cae.workers.dev/0:/"
            frameborder="0"
            allowfullscreen=""></iframe>
    </div>
{{ end }}
