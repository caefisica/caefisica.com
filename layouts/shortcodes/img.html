{{- $image := .Page.Resources.GetMatch (printf "*%s*" (.Get "src")) -}}
{{- $img := partial "components/image-srcset.html" (dict "image" $image) -}}

<figure>
	<img
		class="img-fluid lazyload blur-up{{ with .Get "class" }} {{ . | safeHTML }}{{ end }}"
		data-sizes="auto"
		src="{{ $img.lqip }}"
		data-srcset="{{ $img.srcset }}"
		width="{{ $image.Width }}"
		height="{{ $image.Height }}"
		{{ with .Get "alt" }}alt="{{ . }}"{{ end }} />
	<noscript><img
			class="img-fluid{{ with .Get "class" }} {{ . | safeHTML }}{{ end }}"
			sizes="100vw"
			srcset="{{ $img.srcset }}"
			src="{{ $img.src }}"
			width="{{ $image.Width }}"
			height="{{ $image.Height }}"
			{{ with .Get "alt" }}alt="{{ . }}"{{ end }}
		/>
	</noscript>
	{{ with .Get "caption" }}
		<figcaption class="figure-caption">{{ . | safeHTML }}</figcaption>
	{{ end }}
</figure>
